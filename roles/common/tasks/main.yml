- name: Set timezone
  timezone:
    name: "Europe/Tallinn"

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 86400

- name: Install common packages
  package:
    name: "{{ common_packages }}"
    state: present

- name: Deploy MOTD
  template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: '0644'
