- name: Install Bind
  apt:
    name:
      - bind9
      - bind9-utils
      - dnsutils
    state: present

- name: Deploy named.conf.options
  template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: '0644'
  notify: Restart Bind

- name: Deploy named.conf.local
  template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: '0644'
  notify: Restart Bind

- name: Deploy zone files
  template:
    src: "{{ item.src }}"
    dest: "/etc/bind/{{ item.dest }}"
    owner: root
    group: bind
    mode: '0644'
  loop:
    - { src: 'db.apps.lab.local.j2', dest: 'db.apps.lab.local' }
    - { src: 'db.192.168.10.j2', dest: 'db.192.168.10' }
  notify: Restart Bind 

- name: Enable and start Bind
  systemd:
    name: bind9
    enabled: yes
    state: started
